<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg512" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f8cff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect width="512" height="512" fill="url(#bg512)" rx="112"/>
  <!-- Clipboard base -->
  <rect x="128" y="80" width="256" height="352" rx="20" fill="white" opacity="0.95"/>
  <rect x="160" y="80" width="192" height="32" rx="8" fill="url(#bg512)"/>
  <!-- Checkbox 1 -->
  <rect x="160" y="160" width="36" height="36" rx="6" fill="#e5e7eb" stroke="#4f8cff" stroke-width="4"/>
  <polyline points="180,178 184,184 196,170" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="216" y1="176" x2="360" y2="176" stroke="#d1d5db" stroke-width="5" stroke-linecap="round"/>
  <!-- Checkbox 2 -->
  <rect x="160" y="230" width="36" height="36" rx="6" fill="#e5e7eb" stroke="#4f8cff" stroke-width="4"/>
  <polyline points="180,248 184,254 196,240" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="216" y1="246" x2="380" y2="246" stroke="#d1d5db" stroke-width="5" stroke-linecap="round"/>
  <!-- Checkbox 3 (checked) -->
  <rect x="160" y="300" width="36" height="36" rx="6" fill="#2563eb" stroke="#2563eb" stroke-width="4"/>
  <polyline points="180,318 184,324 196,310" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="216" y1="316" x2="370" y2="316" stroke="#d1d5db" stroke-width="5" stroke-linecap="round"/>
  <!-- Checkbox 4 (empty) -->
  <rect x="160" y="370" width="36" height="36" rx="6" fill="#e5e7eb" stroke="#4f8cff" stroke-width="4"/>
  <line x1="216" y1="386" x2="340" y2="386" stroke="#d1d5db" stroke-width="5" stroke-linecap="round"/>
</svg>
